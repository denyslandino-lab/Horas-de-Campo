<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pregação 2026">
<meta name="theme-color" content="#0A1628">
<title>Pregação 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;padding-bottom:74px}
.topbar{background:linear-gradient(135deg,#0A1628 0%,#0D2045 100%);padding:14px 14px 10px;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(55,138,221,0.2)}
.topbar-row{display:flex;align-items:center;justify-content:space-between}
.app-title{font-size:16px;font-weight:700;color:#E6F1FB;display:flex;align-items:center;gap:7px}
.app-title-dot{width:8px;height:8px;border-radius:50%;background:#378ADD;box-shadow:0 0 8px #378ADD;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.mnbtn{background:rgba(55,138,221,0.15);border:1px solid rgba(55,138,221,0.3);border-radius:8px;width:34px;height:34px;font-size:20px;color:#85B7EB;cursor:pointer;display:flex;align-items:center;justify-content:center}
.month-lbl{font-size:14px;font-weight:600;color:#E6F1FB;min-width:100px;text-align:center}
.hero{background:linear-gradient(160deg,#0A1628 0%,#0D2045 40%,#0C447C 75%,#185FA5 100%);padding:22px 16px 20px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(55,138,221,0.25) 0%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:-30px;left:-20px;width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,rgba(24,95,165,0.3) 0%,transparent 70%);pointer-events:none}
.hero-grid{display:grid;grid-template-columns:1fr auto;align-items:flex-start;gap:10px;margin-bottom:16px;position:relative;z-index:1}
.hero-month{font-size:10px;font-weight:700;color:#378ADD;letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.hero-month::before{content:'';display:inline-block;width:16px;height:1px;background:#378ADD}
.hero-big{font-size:56px;font-weight:800;color:#fff;line-height:1;letter-spacing:-2px;text-shadow:0 0 30px rgba(55,138,221,0.4)}
.hero-big sub{font-size:20px;font-weight:400;color:#85B7EB;letter-spacing:0;vertical-align:baseline;margin-left:2px}
.hero-sub{font-size:11px;color:#85B7EB;margin-top:5px}
.badge-meta{background:rgba(55,138,221,0.2);border:1px solid rgba(55,138,221,0.4);border-radius:20px;padding:6px 12px;text-align:center}
.badge-meta-val{font-size:18px;font-weight:700;color:#fff}
.badge-meta-lbl{font-size:9px;color:#85B7EB;margin-top:1px;letter-spacing:.05em}
.prog-section{position:relative;z-index:1;margin-bottom:16px}
.prog-labels{display:flex;justify-content:space-between;margin-bottom:6px}
.prog-labels span{font-size:10px;color:#85B7EB}
.prog-labels strong{font-size:10px;color:#378ADD;font-weight:700}
.prog-track{background:rgba(255,255,255,0.08);border-radius:8px;height:10px;overflow:hidden;border:1px solid rgba(55,138,221,0.2)}
.prog-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,#378ADD,#63C5F7);transition:width .6s cubic-bezier(.4,0,.2,1);position:relative}
.prog-fill::after{content:'';position:absolute;right:0;top:0;bottom:0;width:4px;background:#fff;border-radius:2px;opacity:.8;box-shadow:0 0 6px #63C5F7}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;position:relative;z-index:1}
.scard{background:rgba(255,255,255,0.07);border:1px solid rgba(55,138,221,0.2);border-radius:10px;padding:8px 4px;text-align:center}
.scard-val{font-size:19px;font-weight:700;color:#fff;line-height:1}
.scard-lbl{font-size:9px;color:#85B7EB;margin-top:3px}
.anual-strip{background:linear-gradient(90deg,#0D2045,#0C447C);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(55,138,221,0.2)}
.anual-lbl{font-size:10px;color:#378ADD;letter-spacing:.05em;text-transform:uppercase}
.anual-val{font-size:14px;font-weight:700;color:#E6F1FB;margin-top:1px}
.sec{font-size:11px;font-weight:700;color:#185FA5;padding:10px 10px 5px;background:#f0f4f8;text-transform:uppercase;letter-spacing:.05em}
.chart-wrap{padding:0 10px;background:#f0f4f8}
.cc{background:#fff;border-radius:10px;padding:10px 12px}
.ct{font-size:11px;color:#378ADD;font-weight:500;margin-bottom:8px}
.br{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.bl{font-size:11px;width:18px;text-align:right;font-weight:600;flex-shrink:0}
.bt{flex:1;height:9px;background:#E6F1FB;border-radius:5px;overflow:hidden}
.bf{height:100%;border-radius:5px;background:linear-gradient(90deg,#185FA5,#378ADD)}
.bv{font-size:11px;color:#0C447C;width:48px;font-weight:500;flex-shrink:0}
.day-list{padding:0 10px 10px;display:flex;flex-direction:column;gap:7px;background:#f0f4f8}
.dc{background:#fff;border-radius:10px;padding:10px 12px}
.dh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.di{display:flex;align-items:baseline;gap:5px}
.dn{font-size:16px;font-weight:700;color:#0C447C}
.dw{font-size:11px;color:#85B7EB}
.dn.s{color:#E24B4A}.dw.s{color:#E24B4A}
.dn.b{color:#185FA5}.dw.b{color:#185FA5}
.dt{font-size:12px;font-weight:600;color:#185FA5}
.dt.z{color:#B5D4F4}

/* PICKER */
.picker-wrap{display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:10px}
.picker-col{display:flex;flex-direction:column;align-items:center;gap:2px}
.picker-lbl{font-size:9px;color:#85B7EB;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px}
.picker-drum{width:64px;height:108px;overflow:hidden;position:relative;border-radius:12px;background:#f0f4f8;border:1.5px solid #B5D4F4;cursor:grab;user-select:none;-webkit-user-select:none}
.picker-drum.active{border-color:#185FA5;background:#E6F1FB}
.picker-list{position:absolute;left:0;right:0;top:0;transition:transform .15s ease-out}
.picker-item{height:36px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:600;color:#B5D4F4;transition:color .1s,font-size .1s}
.picker-item.sel{color:#0C447C;font-size:20px}
.picker-item.adj{color:#378ADD;font-size:15px}
.picker-overlay{position:absolute;left:0;right:0;pointer-events:none}
.picker-overlay.top{top:0;height:36px;background:linear-gradient(to bottom,#f0f4f8,transparent)}
.picker-overlay.bot{bottom:0;height:36px;background:linear-gradient(to top,#f0f4f8,transparent)}
.picker-drum.active .picker-overlay.top{background:linear-gradient(to bottom,#E6F1FB,transparent)}
.picker-drum.active .picker-overlay.bot{background:linear-gradient(to top,#E6F1FB,transparent)}
.picker-sel-line{position:absolute;left:6px;right:6px;height:36px;top:36px;border-top:1.5px solid #185FA5;border-bottom:1.5px solid #185FA5;pointer-events:none;border-radius:4px;background:rgba(24,95,165,0.06)}
.picker-sep{font-size:20px;font-weight:700;color:#0C447C;padding:0 2px;margin-top:18px}
.picker-clear{background:none;border:none;font-size:11px;color:#B5D4F4;cursor:pointer;padding:2px 6px;margin-top:2px}
.picker-clear.has-val{color:#E24B4A}

/* COUNTERS */
.counter-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.counter-box{background:#f0f4f8;border-radius:8px;padding:6px 4px;text-align:center}
.counter-lbl{font-size:9px;color:#378ADD;font-weight:600;text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px}
.counter-row{display:flex;align-items:center;justify-content:center;gap:6px}
.cbtn{background:#E6F1FB;border:none;border-radius:50%;width:24px;height:24px;font-size:15px;color:#185FA5;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.cval{font-size:16px;font-weight:700;color:#0C447C;min-width:18px;text-align:center}

.footer{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(90deg,#0A1628,#0C447C);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(55,138,221,0.3)}
.ftl{font-size:10px;color:#85B7EB;margin-bottom:1px;letter-spacing:.03em}
.ftv{font-size:14px;font-weight:700;color:#fff}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-row">
    <span class="app-title"><span class="app-title-dot"></span>Pregação 2026</span>
    <div style="display:flex;align-items:center;gap:2px">
      <button class="mnbtn" id="p">‹</button>
      <span class="month-lbl" id="ml"></span>
      <button class="mnbtn" id="n">›</button>
    </div>
  </div>
</div>

<div class="hero">
  <div class="hero-grid">
    <div>
      <div class="hero-month" id="hm"></div>
      <div class="hero-big"><span id="hh">0</span><sub>h <span id="hmin">00</span>min</sub></div>
      <div class="hero-sub" id="hsub">Nenhum dia registrado</div>
    </div>
    <div class="badge-meta">
      <div class="badge-meta-val" id="hpct">0%</div>
      <div class="badge-meta-lbl">DA META</div>
    </div>
  </div>
  <div class="prog-section">
    <div class="prog-labels"><span>Progresso mensal</span><strong>Meta: 10h</strong></div>
    <div class="prog-track"><div class="prog-fill" id="hpf" style="width:0%"></div></div>
  </div>
  <div class="stats-row">
    <div class="scard"><div class="scard-val" id="hs1">0</div><div class="scard-lbl">Dias</div></div>
    <div class="scard"><div class="scard-val" id="hs2">0</div><div class="scard-lbl">Revisitas</div></div>
    <div class="scard"><div class="scard-val" id="hs4">0</div><div class="scard-lbl">Est. Bíbl.</div></div>
    <div class="scard"><div class="scard-val" id="hs3" style="font-size:13px;padding-top:3px">—</div><div class="scard-lbl">Média/dia</div></div>
  </div>
</div>

<div class="anual-strip">
  <div><div class="anual-lbl">Acumulado 2026</div><div class="anual-val" id="av">0h 00min</div></div>
  <div style="text-align:right"><div class="anual-lbl">Rev. / Est. no ano</div><div class="anual-val" id="ar">0 / 0</div></div>
</div>

<div id="cs" style="display:none">
  <div class="sec">Distribuição do mês</div>
  <div class="chart-wrap"><div class="cc"><div class="ct">Horas por dia</div><div id="bw"></div></div></div>
</div>

<div class="sec">Registrar dias</div>
<div class="day-list" id="dl"></div>

<div class="footer">
  <div><div class="ftl">TOTAL HORAS</div><div class="ftv" id="gt">0h 00min</div></div>
  <div style="text-align:center"><div class="ftl">REVISITAS</div><div class="ftv" id="gr">0</div></div>
  <div style="text-align:center"><div class="ftl">EST. BÍBLICOS</div><div class="ftv" id="ge">0</div></div>
  <div style="text-align:right"><div class="ftl">DIAS</div><div class="ftv" id="gd">0</div></div>
</div>

<script>
const MN=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const WD=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const META=600;
const HOURS=[0,1,2,3,4,5,6,7,8];
const MINS=[0,30];
let mo=new Date().getMonth(),yr=2026,dt={};
function sv(){try{localStorage.setItem('p26v2',JSON.stringify(dt));}catch(e){}}
function ld(){try{const x=localStorage.getItem('p26v2');if(x)dt=JSON.parse(x);}catch(e){}}
const k=(y,m,d)=>`${y}${m}${d}`;
const kr=(y,m,d)=>`r${y}${m}${d}`;
const ke=(y,m,d)=>`e${y}${m}${d}`;
const dys=(y,m)=>Array.from({length:new Date(y,m+1,0).getDate()},(_,i)=>i+1);
const tm=(y,m)=>dys(y,m).reduce((s,d)=>s+(dt[k(y,m,d)]||0),0);
const tr=(y,m)=>dys(y,m).reduce((s,d)=>s+(dt[kr(y,m,d)]||0),0);
const te=(y,m)=>dys(y,m).reduce((s,d)=>s+(dt[ke(y,m,d)]||0),0);
const ad=(y,m)=>dys(y,m).filter(d=>(dt[k(y,m,d)]||0)>0).length;
const ft=x=>`${Math.floor(x/60)}h ${String(x%60).padStart(2,'0')}min`;
const fsh=x=>{const h=Math.floor(x/60),m=x%60;return m?`${h}h30`:`${h}h`;};

// ---- PICKER ----
function makePicker(drum, items, initIdx, onchange){
  const ITEM_H=36, VISIBLE=3, PAD=ITEM_H;
  let idx=initIdx, startY=0, startOff=0, curOff=0, dragging=false;
  const list=drum.querySelector('.picker-list');

  function render(animated){
    list.style.transition=animated?'transform .18s ease-out':'none';
    list.style.transform=`translateY(${PAD - idx*ITEM_H}px)`;
    list.querySelectorAll('.picker-item').forEach((el,i)=>{
      el.className='picker-item'+(i===idx?' sel':Math.abs(i-idx)===1?' adj':'');
    });
  }

  function clamp(i){return Math.max(0,Math.min(items.length-1,i));}

  drum.addEventListener('touchstart',e=>{
    dragging=true;startY=e.touches[0].clientY;
    startOff=PAD-idx*ITEM_H;
    list.style.transition='none';
    drum.classList.add('active');
  },{passive:true});

  drum.addEventListener('touchmove',e=>{
    if(!dragging)return;
    const dy=e.touches[0].clientY-startY;
    curOff=startOff+dy;
    list.style.transform=`translateY(${curOff}px)`;
    const newIdx=clamp(Math.round((PAD-curOff)/ITEM_H));
    if(newIdx!==idx){
      idx=newIdx;
      list.querySelectorAll('.picker-item').forEach((el,i)=>{
        el.className='picker-item'+(i===idx?' sel':Math.abs(i-idx)===1?' adj':'');
      });
    }
  },{passive:true});

  drum.addEventListener('touchend',()=>{
    dragging=false;
    drum.classList.remove('active');
    render(true);
    onchange(idx);
  });

  render(false);
  return {getIdx:()=>idx, setIdx:(i,anim=true)=>{idx=clamp(i);render(anim);} };
}

function createDayCard(d){
  const dw=new Date(yr,mo,d).getDay();
  const kk=k(yr,mo,d),kkr=kr(yr,mo,d),kke=ke(yr,mo,d);
  const vl=dt[kk]||0,rv=dt[kkr]||0,ev=dt[kke]||0;
  const sc=dw===0?'s':dw===6?'b':'';
  const initH=Math.floor(vl/60), initM=vl%60===30?1:0;

  const card=document.createElement('div');
  card.className='dc';
  card.id=`dc${d}`;
  card.innerHTML=`
    <div class="dh">
      <div class="di"><span class="dn ${sc}">${d}</span><span class="dw ${sc}">${WD[dw]}, ${MN[mo].slice(0,3)}</span></div>
      <span class="dt ${vl?'':'z'}" id="dtotal${d}">${vl?ft(vl):'—'}</span>
    </div>
    <div class="picker-wrap">
      <div class="picker-col">
        <div class="picker-lbl">horas</div>
        <div class="picker-drum" id="ph${d}">
          <div class="picker-sel-line"></div>
          <div class="picker-list">${HOURS.map(h=>`<div class="picker-item">${h}</div>`).join('')}</div>
          <div class="picker-overlay top"></div>
          <div class="picker-overlay bot"></div>
        </div>
      </div>
      <div class="picker-sep">:</div>
      <div class="picker-col">
        <div class="picker-lbl">min</div>
        <div class="picker-drum" id="pm${d}">
          <div class="picker-sel-line"></div>
          <div class="picker-list">${MINS.map(m=>`<div class="picker-item">${String(m).padStart(2,'0')}</div>`).join('')}</div>
          <div class="picker-overlay top"></div>
          <div class="picker-overlay bot"></div>
        </div>
      </div>
      <div class="picker-col" style="justify-content:flex-end">
        <div class="picker-lbl">&nbsp;</div>
        <button class="picker-clear ${vl?'has-val':''}" id="pclr${d}">✕ limpar</button>
      </div>
    </div>
    <div class="counter-grid">
      <div class="counter-box">
        <div class="counter-lbl">Revisitas</div>
        <div class="counter-row"><button class="cbtn" id="rm${d}">−</button><span class="cval" id="rv${d}">${rv}</span><button class="cbtn" id="rp${d}">+</button></div>
      </div>
      <div class="counter-box">
        <div class="counter-lbl">Est. Bíblico</div>
        <div class="counter-row"><button class="cbtn" id="em${d}">−</button><span class="cval" id="ev${d}">${ev}</span><button class="cbtn" id="ep${d}">+</button></div>
      </div>
      <div class="counter-box" style="background:#E6F1FB">
        <div class="counter-lbl" style="color:#0C447C">Total dia</div>
        <div style="font-size:12px;font-weight:700;color:#185FA5;margin-top:6px" id="tdtotal${d}">${vl?ft(vl):'—'}</div>
      </div>
    </div>`;

  const ph=makePicker(card.querySelector(`#ph${d}`), HOURS, initH, hi=>{
    const mi=pm.getIdx();
    const total=HOURS[hi]*60+MINS[mi];
    dt[kk]=total>0?total:0;
    if(!dt[kk])delete dt[kk];
    sv(); updateCard(d);
  });
  const pm=makePicker(card.querySelector(`#pm${d}`), MINS, initM, mi=>{
    const hi=ph.getIdx();
    const total=HOURS[hi]*60+MINS[mi];
    dt[kk]=total>0?total:0;
    if(!dt[kk])delete dt[kk];
    sv(); updateCard(d);
  });

  card.querySelector(`#pclr${d}`).onclick=()=>{
    delete dt[kk]; ph.setIdx(0); pm.setIdx(0); sv(); updateCard(d); re();
  };
  card.querySelector(`#rp${d}`).onclick=()=>{dt[kkr]=(dt[kkr]||0)+1;sv();re();};
  card.querySelector(`#rm${d}`).onclick=()=>{if((dt[kkr]||0)>0){dt[kkr]--;if(!dt[kkr])delete dt[kkr];sv();re();}};
  card.querySelector(`#ep${d}`).onclick=()=>{dt[kke]=(dt[kke]||0)+1;sv();re();};
  card.querySelector(`#em${d}`).onclick=()=>{if((dt[kke]||0)>0){dt[kke]--;if(!dt[kke])delete dt[kke];sv();re();}};

  return card;
}

function updateCard(d){
  const vl=dt[k(yr,mo,d)]||0;
  const el=document.getElementById(`dtotal${d}`);
  const el2=document.getElementById(`tdtotal${d}`);
  const clr=document.getElementById(`pclr${d}`);
  if(el){el.textContent=vl?ft(vl):'—';el.className='dt'+(vl?'':' z');}
  if(el2){el2.textContent=vl?ft(vl):'—';}
  if(clr){clr.className='picker-clear'+(vl?' has-val':'');}
  re();
}

function re(){
  document.getElementById('ml').textContent=MN[mo];
  const dd=dys(yr,mo),tot=tm(yr,mo),act=ad(yr,mo),rev=tr(yr,mo),est=te(yr,mo);
  const pct=Math.min(100,Math.round(tot/META*100));
  const avg=act?fsh(Math.round(tot/act)):'—';
  const yrTot=MN.reduce((s,_,i)=>s+tm(yr,i),0);
  const yrRev=MN.reduce((s,_,i)=>s+tr(yr,i),0);
  const yrEst=MN.reduce((s,_,i)=>s+te(yr,i),0);
  document.getElementById('hm').textContent=MN[mo]+' '+yr;
  document.getElementById('hh').textContent=Math.floor(tot/60);
  document.getElementById('hmin').textContent=String(tot%60).padStart(2,'0');
  document.getElementById('hsub').textContent=act>0?act+' dia'+(act!==1?'s':'')+' de pregação':'Nenhum dia registrado';
  document.getElementById('hpct').textContent=pct+'%';
  document.getElementById('hpf').style.width=pct+'%';
  document.getElementById('hs1').textContent=act;
  document.getElementById('hs2').textContent=rev;
  document.getElementById('hs3').textContent=avg;
  document.getElementById('hs4').textContent=est;
  document.getElementById('av').textContent=ft(yrTot);
  document.getElementById('ar').textContent=yrRev+' / '+yrEst;
  document.getElementById('gt').textContent=ft(tot);
  document.getElementById('gr').textContent=rev;
  document.getElementById('ge').textContent=est;
  document.getElementById('gd').textContent=act;
  const aa=dd.filter(d=>(dt[k(yr,mo,d)]||0)>0),cs=document.getElementById('cs');
  if(aa.length){
    cs.style.display='';
    document.getElementById('bw').innerHTML=aa.map(d=>{
      const x=dt[k(yr,mo,d)]||0,p=Math.round(x/480*100);
      const lc=new Date(yr,mo,d).getDay()===0?'#E24B4A':'#378ADD';
      return `<div class="br"><span class="bl" style="color:${lc}">${d}</span><div class="bt"><div class="bf" style="width:${p}%"></div></div><span class="bv">${ft(x)}</span></div>`;
    }).join('');
  } else cs.style.display='none';
}

function buildDays(){
  const li=document.getElementById('dl');
  li.innerHTML='';
  dys(yr,mo).forEach(d=>li.appendChild(createDayCard(d)));
}

document.getElementById('p').onclick=()=>{mo--;if(mo<0){mo=11;yr--;}re();buildDays();};
